# =============================================================================
# hls.conf — HTTP server block for Castify HLS origin
# =============================================================================
# Serves HLS segments (.ts) and playlists (.m3u8) from /tmp/hls/.
# Also exposes:
#   /stat   — nginx-rtmp live statistics (active streams, bitrate, etc.)
#   /health — simple health check for docker-compose and load balancers
#
# The viewer's HLS.js player fetches:
#   http://localhost:8080/hls/<stream-key>/index.m3u8
#   http://localhost:8080/hls/<stream-key>/<segment>.ts
# =============================================================================

server {
    listen 8080;
    server_name _;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         SAMEORIGIN always;

    # ── CORS — allow the Next.js dev server and any viewer origin ────────
    # In production restrict this to your domain.
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range, Origin, Accept" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

    # Handle OPTIONS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── HLS segment & manifest serving ───────────────────────────────────
    location /hls {
        alias /tmp/hls;

        # MIME types for HLS
        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp2t                     ts;
        }

        # Disable caching for the live playlist — it changes every 2 seconds
        location ~* \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       "0";
            # Re-apply CORS (nested location resets inherited headers)
            add_header Access-Control-Allow-Origin  "*" always;
        }

        # Cache .ts segments aggressively — once written they never change
        location ~* \.ts$ {
            add_header Cache-Control "public, max-age=86400, immutable";
            add_header Access-Control-Allow-Origin  "*" always;
        }

        # Range request support — required for some HLS clients
        add_header Accept-Ranges bytes;
    }

    # ── MPEG-DASH (optional) ─────────────────────────────────────────────
    # location /dash {
    #     alias /tmp/dash;
    #     types {
    #         application/dash+xml  mpd;
    #         video/mp2t            ts;
    #         video/mp4             mp4 m4s;
    #     }
    #     add_header Cache-Control "no-cache";
    #     add_header Access-Control-Allow-Origin "*" always;
    # }

    # ── nginx-rtmp statistics page ───────────────────────────────────────
    # Returns XML with live stream info: active publishers, subscribers,
    # bitrate per stream, connected clients.
    # Useful for debugging during Phase 1.
    location /stat {
        rtmp_stat all;
        rtmp_stat_stylesheet stat.xsl;
        add_header Content-Type text/xml;
        # Restrict to localhost in prod; open for local dev
        allow 127.0.0.1;
        allow 172.16.0.0/12;   # Docker bridge
        allow 10.0.0.0/8;      # Docker internal
        allow 192.168.0.0/16;  # LAN
        deny  all;
    }

    location /stat.xsl {
        root /etc/nginx;
    }

    # ── Control API — send RTMP commands from HTTP ───────────────────────
    # POST /control/drop/publisher?app=live&name=<stream-key>
    # POST /control/drop/client?app=live&name=<stream-key>&clientid=<id>
    # Used by rtmp-ingest to forcibly disconnect a stream (e.g. on key rotation)
    location /control {
        rtmp_control all;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny  all;
    }

    # ── Health check ─────────────────────────────────────────────────────
    # Returns 200 OK — used by docker-compose healthcheck and upstreams.
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx-rtmp"}\n';
        add_header Content-Type application/json;
    }

    # ── HLS Player — dev tool served directly from nginx ─────────────────
    # Open: http://localhost:8080/player
    # Serves infrastructure/hls-player/index.html.
    # Avoids cross-origin issues since both the player (8080/player) and
    # the MinIO proxy (8080/minio/) are on the same origin.
    location /player {
        alias /etc/nginx/hls-player;
        index index.html;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── MinIO proxy — serves HLS segments from S3 with CORS ──────────────
    # URL pattern: http://localhost:8080/minio/hls-segments/live/<key>/master.m3u8
    # → proxied to:  http://minio:9000/hls-segments/live/<key>/master.m3u8
    #
    # Why proxy instead of direct MinIO access:
    #   MinIO's mc-based CORS config is unreliable in some mc versions.
    #   Proxying through nginx lets us add CORS headers in a single place
    #   with no MinIO config required.
    #
    # NOTE: nested regex locations (location ~*) pass the full original URI,
    # including the /minio/ prefix, to the upstream — breaking the proxy.
    # Keep all proxy and header logic in a single flat location block.
    location /minio/ {
        proxy_pass         http://minio:9000/;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_buffering    off;

        # CORS for browser HLS players
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # MIME types for HLS
        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp2t                     ts;
        }
    }

    # ── Default — 404 for anything else ──────────────────────────────────
    location / {
        return 404 '{"error":"not found"}\n';
        add_header Content-Type application/json;
    }
}
