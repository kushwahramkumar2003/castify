# =============================================================================
# nginx.conf — Main Nginx configuration for Castify local development
# =============================================================================
# Compatible with the alfg/nginx-rtmp pre-built image (Alpine Linux).
#
# Structure:
#   [global]                     — worker processes, pid, error log
#   events { }                   — connection handling
#   include conf.d/rtmp.conf     — RTMP block (must be at root level, outside http)
#   http { include conf.d/hls.conf }  — HTTP server for HLS origin
#
# To apply config changes without restarting the container:
#   docker exec castify-nginx-rtmp nginx -s reload
# To test config syntax before reloading:
#   docker exec castify-nginx-rtmp nginx -t
# =============================================================================

worker_processes  auto;           # one worker per CPU core
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    # epoll is Linux-only and is the default on Linux — no need to set explicitly
}

# ---------------------------------------------------------------------------
# RTMP block — must live at root level (not inside http {})
# Loaded from conf.d/rtmp.conf (mounted as a volume)
# ---------------------------------------------------------------------------
include /etc/nginx/conf.d/rtmp.conf;

# ---------------------------------------------------------------------------
# HTTP block — HLS origin server + health + stat
# ---------------------------------------------------------------------------
http {
    # alfg/nginx-rtmp (Alpine) ships mime.types at this path
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # Gzip for text-based HLS responses (m3u8 manifests, JSON)
    gzip        on;
    gzip_vary   on;
    gzip_types  text/plain application/json application/x-mpegURL
                application/vnd.apple.mpegurl;

    # HLS origin server block (mounted from conf.d/hls.conf)
    include /etc/nginx/conf.d/hls.conf;
}
