# =============================================================================
# rtmp.conf — RTMP server block for Castify
# =============================================================================
# Accepts live streams from OBS on port 1935.
#
# OBS stream settings:
#   Service:  Custom
#   Server:   rtmp://localhost:1935/live
#   Stream key: <your-stream-key>   (validated by rtmp-ingest service)
#
# Flow:
#   OBS  →  nginx (port 1935, application "live")
#        →  on_publish callback   → rtmp-ingest validates stream key
#        →  on_publish_done       → rtmp-ingest publishes stream.ended event
#        →  HLS output written to /tmp/hls/<stream-key>/
#        →  served by hls.conf on port 8080
# =============================================================================

rtmp {
    server {
        listen 1935;
        chunk_size 4096;         # larger chunks = better throughput for video
        max_message 1M;

        # ── application: live ───────────────────────────────────────────
        # Primary ingest point. OBS points here.
        application live {
            live on;
            record off;          # we handle recording in hls-packager via S3

            # ── Stream key validation ──────────────────────────────────
            # When OBS connects, nginx calls rtmp-ingest's HTTP callback.
            # rtmp-ingest validates the stream key against auth-service.
            # If auth-service returns non-2xx, the stream is rejected.
            #
            # In dev: rtmp-ingest runs on host port 3001
            # The callback URL reaches the HOST from inside the container
            # via host.docker.internal (Mac/Windows) or 172.17.0.1 (Linux).
            on_publish      http://host.docker.internal:3001/rtmp/on-publish;
            on_publish_done http://host.docker.internal:3001/rtmp/on-publish-done;
            on_play         http://host.docker.internal:3001/rtmp/on-play;

            # ── HLS output ──────────────────────────────────────────────
            # nginx-rtmp-module slices the incoming stream into HLS segments
            # and writes them to /tmp/hls/<stream-key>/.
            # hls.conf serves these files over HTTP on port 8080.
            #
            # Note: in production the hls-packager service handles segmentation
            # and uploads to S3. This local HLS output is a convenience for
            # Phase 1 development so you can watch the stream before the full
            # transcoding pipeline is wired up.
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;          # 2-second segments (matches hls-packager target)
            hls_playlist_length 10s;  # sliding window of 5 × 2s segments
            hls_nested on;            # writes to /tmp/hls/<stream-key>/index.m3u8

            # Sync timestamps across streams (important for multi-quality ABR)
            hls_sync 100ms;

            # Drop slow subscribers rather than buffer-bloating
            drop_idle_publisher 30s;

            # ── MPEG-DASH output (optional, disabled by default) ─────────
            # dash off;
            # dash_path /tmp/dash;
            # dash_fragment 2s;
            # dash_playlist_length 10s;
            # dash_nested on;

            # ── Allow specific RTMP publishing IPs only ──────────────────
            # In prod you would restrict to known IPs. Locally, allow all.
            allow publish all;
            allow play   all;
        }

        # ── application: encoder ────────────────────────────────────────
        # Internal application — transcoding-service pushes re-encoded
        # streams here after FFmpeg processing. Not exposed externally.
        application encoder {
            live on;
            record off;

            # This application feeds back into the hls application so the
            # transcoded stream can be served via HLS.
            # push rtmp://localhost:1935/live;

            allow publish 127.0.0.1;
            allow publish 172.16.0.0/12;  # Docker bridge networks
            deny  publish all;
            allow play    all;
        }
    }
}
